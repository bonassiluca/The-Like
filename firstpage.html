<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&family=Metal+Mania&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Eater&display=swap" rel="stylesheet">
    <title>PRIMA PAGINA</title>
</head>
<body>
    <div class="titolo">
        <p class="titologrande">The Like</p>
    </div>

    <nav>
        <div class="info">
            <p>Folio Vol. 1</p>
        </div>
        <div class="logo">
            <p><a href="#">THE LIKE</a></p>
        </div>
        <div class="toggle-btn">
            <button class="burger" 
            onclick="this.classList.toggle('active');"
            ></button>
        </div>
    </nav>

    <div class="overlay">
        <div class="overlay-menu">
            <div class="menu-item">
                <p><a href="#">[01] PSYCH-PROFILE</a></p>
            </div>
            <div class="menu-item">
                <p><a href="#">[02] SYSTEM CORE</a></p>
            </div>
            <div class="menu-item">
                <p><a href="#">[03] COUNTERMEASURES</a></p>
            </div>
            <div class="menu-item">
                <p><a href="#">[04] EVALUATION-QUIZ</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/CSSRulePlugin.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let activeItemIndicator = CSSRulePlugin.getRule(".menu-item p#active::after");
            const toggleButton = document.querySelector(".burger");
            let isOpen = false;

            gsap.set(".menu-item p", { y: 225 });

            const timeline = gsap.timeline({ paused: true });

            timeline.to(".overlay", {
                duration: 1.5,
                clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
                ease: "power4.inOut",
                pointerEvents: "all"
            });

            timeline.to(".menu-item p", {
                duration: 1.5,
                y: 0,
                stagger: 0.2,
                ease: "power4.out"
            }, "-=1");

            timeline.to(activeItemIndicator, {
                width: "100%",
                duration: 1,
                ease: "power4.out",
                delay: 0.5
            }, "<");

            timeline.to(".sub-nav", {
                bottom: "10%",
                opacity: 1,
                duration: 0.5,
                delay: 0.5
            }, "<");

            toggleButton.addEventListener("click", function() {
                if (isOpen) {
                    timeline.reverse();
                } else {
                    timeline.play();
                }
                isOpen = !isOpen
            })
        })
    </script>
    <script src="script.js"></script>
</body>
</html>
