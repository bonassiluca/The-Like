<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Creepster&family=Metal+Mania&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Eater&display=swap" rel="stylesheet">
    <title>[02] SYSTEM-CORE</title>
</head>
<body>
    <div id="splash-screen">
        <div class="container">
            <div class="loader"></div>
            <div class="loader"></div>
            <div class="loader"></div>
        </div>
    </div>

    <div class="titolo">
        <p class="titolosezione-destro">ALGORITHM</p>
    </div>

    <nav>
        <div class="info">
            <p>[SYSTEM-CORE]</p>
        </div>
        <div class="logo">
            <p><a href="index.html">THE LIKE</a></p>
        </div>
        <div class="toggle-btn">
            <button class="burger"></button>
        </div>
    </nav>

    <div class="overlay">
        <div class="overlay-menu">
            <div class="menu-item">
                <p><a href="FOMO.html">[01] PSYCH-PROFILE</a></p>
            </div>
            <div class="menu-item">
                <p><a href="#">[02] SYSTEM CORE</a></p>
            </div>
            <div class="menu-item">
                <p><a href="#">[03] COUNTERMEASURES</a></p>
            </div>
            <div class="menu-item">
                <p><a href="#">[04] EVALUATION-QUIZ</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/CSSRulePlugin.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            const toggleButton = document.querySelector(".burger");
            let isOpen = false;

            setTimeout(() => {
                    splash.style.opacity = '0'; 
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.body.style.overflow = 'hidden'; 
                }, 800);
            }, 2500);

            gsap.set(".menu-item p", { y: 225 });

            const timeline = gsap.timeline({ paused: true });

            timeline.to(".overlay", {
                duration: 1.5,
                clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
                ease: "power4.inOut",
                pointerEvents: "all"
            });

            timeline.to(".menu-item p", {
                duration: 1.5,
                y: 0,
                stagger: 0.2,
                ease: "power4.out"
            }, "-=1");

            toggleButton.addEventListener("click", function() {
                if (isOpen) {
                    timeline.reverse();
                } else {
                    timeline.play();
                }
                isOpen = !isOpen;
            });

            window.addEventListener('mousemove', (e) => {
                const x = Math.round((e.clientX / window.innerWidth) * 100);
                const y = Math.round((e.clientY / window.innerHeight) * 100);
                document.body.style.setProperty('--mouse-x', x + '%');
                document.body.style.setProperty('--mouse-y', y + '%');
            });
        });
    </script>
</body>
</html>
